<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
<style>
.slid { margin-left:30px; margin-right:20px; margin-bottom:10px; }
</style>
<script>

var merges = {
"r2": 
{
	same: true,
	need: ["r1","r1","r1"]
},

"e1": 
{
	same: false,
	need: ["r2", "r2", "r2"]
},

"e2": 
{
	same: true,
	need: ["e1","e1"]
},

"l1": 
{
	same: false,
	need: ["e2","e2","e2"]
},

"l2": 
{
	same: true,
	need: ["l1","e2"]
},

"m1": 
{
	same: false,
	need: ["l2","l2"]
},

"m2": 
{
	same: false,
	need: ["m1","l2"]
},

"a1": 
{
	same: true,
	need: ["m2","e2","e2"]
}
}


 $( function() {
    
	$('#calc').click(getmerges);
	
	
	
	
	
  } );

	function getmerges()
	{
		html="";
		var base = $('#base').val();
		var want=  $('#want').val();
		
		var have = getHave();
		have.push(base);
		
		var actions = [];
		var missing = [];
		
		doMerge(want, have, missing, actions);
		
		console.log(actions, missing);
		actions.sort(x => x.make);
		
		for(var i=0;i<actions.length;i++)
		{
			html += "Merge "+action2html(actions[i])+"<br />";
		}
		
		
		console.log(base,want,have,merges);
	
		$('#result').html(html);
	}

	function doMerge(want, have, missing, actions)
	{
		if(want=="r1") 
		{
			missing.push("r1")
		} 
		else 
		{
	
			var next = merges[want];
			for(var i=0;i<next.need.length;i++)
			{
				var need = next.need[i];
				
				if(have.indexOf(need)!=-1)
				{
					have.splice(have.indexOf(need),1);
				}
				else 
				{
					doMerge(need, have, missing, actions);
				}
			}
			next.make = want;
			actions.push({ make:want, need:next.need, same:next.same});
		}
	}

	function action2html(action)
	{
		html="";
		for(var i=0;i<action.need.length;i++)
		{
			if(i>0) html += " + ";
			html += "<img src='p/"+action.need[i]+".jpg' />"; 
			
		}
		html += " => <img src='p/"+action.make+".jpg' />" + (action.same?" of the same":"");
		return html;
	}

	function getHave()
	{
		var list=[];
		Get1Have(list,"r1");
		Get1Have(list,"r2");
		Get1Have(list,"e1");
		Get1Have(list,"e2");
		Get1Have(list,"l1");
		Get1Have(list,"l2");
		Get1Have(list,"m1");
		Get1Have(list,"m2");
		Get1Have(list,"a1");
		return list;
	}
	
	function Get1Have(list,mod)
	{
		var num=parseInt($('#fod'+mod).val());
		for(var i=0;i<num;i++)
			list.push(mod);
	}


</script>

<body style="margin:10px;">

<option style="color:black;background:#E17B85;" value="m2">Mythic+</option>
<option style="color:black;background:#9DE390;" value="a1">Ancestral</option>
</select>
</p>

<p>
I want to merge:

<option style="color:black;background:#ECAE6C;" value="l1">Legendary</option>

<option style="color:black;background:#E17B85;" value="m1">Mythic</option>
<option style="color:black;background:#E17B85;" value="m2">Mythic+</option>
<option style="color:black;background:#9DE390;" value="a1">Ancestral</option>
</select>
</p>


I have fodder in:
