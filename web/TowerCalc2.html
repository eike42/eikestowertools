function calc()
{
	var tier = parseInt($('#tier').val());
	var wave = parseInt($('#wave').val());
	var eb = 0; parseInt($('#eb').val());
	var ws = 0; parseInt($('#ws').val());
	var fps = 0; parseInt($('#fps').val());

	var cb = 1; parseFloat($('#cb').val()) * coinbonus[tier];

	var ctp80 = parseInt($('#ctp').val());
	var gt = parseInt($('#gt').val());
	var coins = [];
	$('#coins').val().split(',').forEach(x => coins.push(parseInt(x)));
	
	var total = parseFloat($('#total').val());

	var html=`Tier ${tier} Wave ${wave} <br />`;

	html+="Coin bonus: "+cb.toFixed(2)+"<br />";
	var data_pure = CoinsPerWave(wave, eb,ws,1,[],-1,-1);
	ratio = total/data_pure[wave-1][1];

	var data = CoinsPerWave(wave, eb,ws,1,coins,gt,ctp80);
	var data_pure = CoinsPerWave(wave, eb,ws,1,[],-1,-1);
	
	for(var i=0;i<wave;i++)	
	{
	data[i][1] *= ratio;
	data_pure[i][1] *= ratio;
	}
	
	
	var markings = [ 
	{ xaxis: { from: ctp80, to: ctp80 }, color: "purple" },
	{ xaxis: { from: gt, to: gt }, color: "gold" }
	]
	for(var i=0;i<coins.length;i++)
	{
	markings.push({ xaxis: { from: coins[i], to: coins[i] }, color: "gray" })
	}
	
	console.log(data);
	$.plot("#chart",[data, data_pure], { grid: { markings: markings }});
	
	
	
	var improve=((data[wave-1][1]/data_pure[wave-1][1]*100).toFixed(1));
	html = "Coins without perks: "+data_pure[wave-1][1].toFixed(1)+" B, coins with perks: "+data[wave-1][1].toFixed(1)+" B ("+improve+"%)";
	
	$('#result').html(html);


	var cpm = calcCPM(data);
	var cpm_pure = calcCPM(data_pure);
	
	
	var markings = [ 
	{ xaxis: { from: ctp80, to: ctp80 }, color: "purple" },
	{ xaxis: { from: gt, to: gt }, color: "gold" }
	]
	for(var i=0;i<coins.length;i++)
	{
	markings.push({ xaxis: { from: coins[i], to: coins[i] }, color: "gray" })
	}
	
	console.log(cpm, cpm_pure);
	$.plot("#chart2",[cpm, cpm_pure], { grid: { markings: markings }});
