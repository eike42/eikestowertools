function roll(slots,locked, avail)
{
	var quals=[];
	var types=[];
	var pool = [...Array(avail-locked).keys()];

	for(var i=0;i<slots-locked;i++)
	{
		
		var r =Math.floor(Math.random() * (avail-locked-i));
		types[i] = pool[r];
		pool.splice(r,1);
				
		var r=Math.random();

		if(r<=chance[5])
		{ 
			quals[i] = 4;
			continue;
		}

		if(r<=chance[4])
		{ 
			quals[i] = 3;
			continue;
		}

		if(r<=chance[3])
		{ 
			quals[i] = 2;
			continue;
		}
		if(r<=chance[2])
		{ 
			quals[i] = 1;
			continue;
		}
		quals[i] = 0;
	}
	var res=[];
	for(var i=0;i<types.length;i++)
	{
		res.push({ "qual":quals[i], "type":types[i] });
	}

	return res;


}

function fits(goal,type,roll)
{
	if(roll.type==type && roll.qual >= goal)
	return true;
	else
	return false;


}


function hit(res,goals,strat,found)
{
	var hit = 0;
	for(var i=0;i<res.length;i++)
	{
		if(fits(goals[0], 0, res[i]))
		{
			goals.splice(0,1);
			hit++;
		}
	
		if(strat>1 && (strat - found>1) && goals.length>1)
		if(fits(goals[1], 1, res[i]))
		{
			goals.splice(1,1);
			hit++;
		}
			
		if(strat>2 && (strat - found>2) && goals.length>2)
		if(fits(goals[2], 2, res[i]))
		{
			goals.splice(2,1);
			hit++;
		}
		
					
		if(strat>3 && (strat - found>3) && goals.length>3)
		if(fits(goals[3], 3, res[i]))
		{
			goals.splice(3,1);
			hit++;
		}
	
	}

	return hit;
}

function calc()
{
	var html="";

	var mod = parseInt($('#mod').val());
	var quality = parseInt($('#quality').val());
	var slots = parseInt($('#slots').val());
	var bans = parseInt($('#bans').val());
	var strat =parseInt($('#strat').val());
	var shards =parseInt($('#shards').val());
	var sims =parseInt($('#sims').val());
	
	var resultfound=[[],[],[],[],[],[],[],[]];
	var resultcosts=[];
	
	for(var sim = 0;sim<sims;sim++) 
	{
		var start = window.performance.now();
		var goals = [];
		var locked = 0;
		for(var i=0;i<slots;i++)
		{
			var g = $("input[name=slot"+i+"]:checked").val();
			if(g>0)
				goals.push(g);
			if(g==-1)
				locked++;
		}

		//html+="Rerolling "+goals.length+" stats on a "+quality+" module with "+shards+" reroll shards";

		// run simulations
		var cost = 0;
		var round = 0;
		var found = 0;
		var numsubmodules = amount[mod-1];

		//console.log(`You have ${bans} banned out of ${numsubmodules} possible submodules`);
		
		while(goals.length>0)
		{
			var res = roll(slots,locked, numsubmodules-bans);
			cost += locks[locked];
			round++;
		
			var hitnum = hit(res,goals,strat,found);
			
			if(hitnum>0)
			{
				resultfound[found].push(cost);
				if(hitnum>1) resultfound[found+1].push(cost);
				if(hitnum>2) resultfound[found+2].push(cost);
			
				locked+=hitnum;
				found+=hitnum;
				// console.log("found #"+locked);
				// html+=`Found ${locked} after ${cost} shards.`;
			}
		
			if(round>1000000) break;
		}
		
		resultcosts.push(cost);
		
		if(sim==1)
		{
			var ms = window.performance.now() - start;
			if(ms*sims>10000)
				if(!confirm("The simulation will run about "+(ms*sims/1000).toFixed(1)+" seconds. Do you want to continue?"))
				{
					break;
				}
		}
	}
	
	//console.log(resultcosts,resultfound);
		
	
	
	// avg
	for(var i = 0;i<found;i++)
	{
		r=findMinMaxAvg(resultfound[i] ,shards);
		
		html += "Found stat "+(i+1)+" after an average of "+r[2].toLocaleString()+" shards, min="+r[0].toLocaleString()+", max="+r[1].toLocaleString()+". Successrate with your shards: "+(r[3]*100).toFixed(1)+"%.<br />";
	
	
	}
	
	for (var i = 0; i < found; i++) {
		var data = resultfound[i];
		if (data.length === 0) continue;

		// Group data into 20 bins
		var min = Math.min.apply(null, data);
		var max = Math.max.apply(null, data);
		var binCount = 20;
		var binSize = (max - min) / binCount;
		if (binSize === 0) binSize = 1;

		var bins = new Array(binCount).fill(0);
		for (var j = 0; j < data.length; j++) {
			var idx = Math.floor((data[j] - min) / binSize);
			if (idx >= binCount) idx = binCount - 1;
			bins[idx]++;
		}
		var labels = [];
		for (var k = 0; k < binCount; k++) {
			var from = Math.round(min + k * binSize);
			var to = Math.round(min + (k + 1) * binSize);
			labels.push(from.toLocaleString() + " - " + to.toLocaleString());
		}
		var values = bins.map(function(count) { return count / data.length*100; });

		// Create canvas for chart
		var canvasId = "histogram" + i;
		html += `<div>Submodule ${i + 1} histogram:</div><canvas id="${canvasId}" style="width:600px;height:300px;"></canvas>`;

		setTimeout((function(labels, values, canvasId) {
			return function() {
				if (window.Chart) {
					new Chart(document.getElementById(canvasId), {
						type: 'line',
						data: {
							labels: labels,
							datasets: [{
								label: 'Probability in %',
								data: values,
								backgroundColor: 'rgba(54, 162, 235, 0.5)'
							}]
						},
						options: {
							scales: {
								x: { title: { display: true, text: 'Shards Used (Grouped)' }, ticks: { autoSkip: false, maxRotation: 90, minRotation: 45 } },
								y: { title: { display: true, text: 'Probability in %' }, beginAtZero: true }
							},
							responsive: false,
						}
					});
				}
			};
		})(labels, values, canvasId), 0);
	}
	$('#textresult').html(html);
	
}

function findMinMaxAvg(arr, lim){
  var min = arr[0]; // min
  var max = arr[0]; // max
  var sum = arr[0]; // sum
  var underlim = arr[0] <= lim ? 1 : 0;

  for(var i = 1; i < arr.length; i++){
    if (arr[i] < min) {
      min = arr[i];
    }
    if (arr[i] > max) {
      max = arr[i];
    }
    sum = sum + arr[i];
	if(arr[i] <= lim) underlim++;
  }
  return [min, max, sum / arr.length, underlim / arr.length]
}

function update()
{
	var slots = $('#slots').val();
	if(slots>8) slots=8;
	$('#slots').val(slots);

	var quality = parseInt($('#quality').val());

	var html=""; 
	for(var i=0;i<slots;i++)
	{
		html+="<input type=radio name=slot"+i+" value=-1> locked</input> ";
		html+="<input type=radio name=slot"+i+" value=1> epic</input> ";
		if(quality>1)
			html+="<input type=radio name=slot"+i+" value=2> legendary</input> ";
		if(quality>2)
		html+="<input type=radio name=slot"+i+" value=3> mythic</input> ";
		if(quality>3)
		html+="<input type=radio name=slot"+i+" value=4> ancestral</input> ";
		html+="<input type=radio name=slot"+i+" value=0 checked> don't care</input> ";
		html+="<br/>";
	}
	$('#goal').html(html);
}
