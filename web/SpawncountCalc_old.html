<html>
<head>
<title>TowerCalc</title>
<script
  src="https://code.jquery.com/jquery-3.7.1.min.js"
  integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
  crossorigin="anonymous"></script>
<script src="towercalc.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
<style>
body 
{
    margin: 10px;
}
</style>
<script>

function calc()
{
	var wave = parseInt($('#wave').val());
	var eb = parseInt($('#eb').val());
	var ws = parseInt($('#ws').val());
	var enemy = parseInt($('#enemy').val());
	var tier = parseInt($('#tier').val());
	var iswaves = parseInt($('#iswaves').val());

	var html=`Wave ${wave} <br />`;
	
	var res = totalSpawns(wave, eb, ws, tier, iswaves);

	var loss = (res.spawns - enemy) / res.spawns * 100;

	if(loss > 0)
		html = "Total spawns should be "+res.spawns.toFixed(0)+". You have "+enemy+", that is a loss of "+loss.toFixed(1)+"%.";
		
	else
		html = "Total spawns should be "+res.spawns.toFixed(0)+". You have "+enemy+", that is "+(-loss).toFixed(1)+" % more than calculated, seems you are fine.";

	html +="<br /><br />";

	for(var key in res)
		html+= key + ": " + res[key] + "<br />";

	html += "*Note 1: Scatters are counted per piece in the totals.<br />"
	html += "*Note 2: Protector numbers are unreliable, because of the spawn limit. They are included in the basics for this sake."

	$('#result').html(html);




}




</script>

</head>
<body>

Wave: <input type="text" id="wave" value="5235" /> <br />
Enemy Balance level: <input type="text" id="eb" value="7" /> <br />
Wave skip level: <input type="text" id="ws" value="7" /> <br />
Your total enemy count: <input type="text" id="enemy" value="678062" /> <br />
Tier: <input type="text" id="tier" value="10" /> <br />
Intro sprint waves: <input type="text" id="iswaves" value="0" /> <br />

<br />
<br />
<button id="calc" onclick="calc();" >calc</button>
<br />
<br />
<div id="result">



</div>



<div>
More information on reddit: <a href="https://www.reddit.com/r/TheTowerGame/comments/1huyrn3/number_of_enemy_spawns_losses/">https://www.reddit.com/r/TheTowerGame/comments/1huyrn3/number_of_enemy_spawns_losses/</a>







</body>
</html>
