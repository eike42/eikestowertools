            padding: 24px;
            box-shadow: 0 2px 12px #0004;
            overflow-x: auto;
            max-width: 100vw;
        }

        .chart-container svg {
            min-width: 600px;
            display: block;
        }

        .chart-title {
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #f7c873;
        }

        /* Responsive styles */
        @media (max-width: 900px) {
            .chart-container {
                padding: 10px;
            }

            .chart-container svg {
                min-width: 500px;
            }
        }

        @media (max-width: 600px) {
            body {
                margin: 4px;
            }

            .chart-container {
                padding: 4px;
                border-radius: 6px;
            }

            .chart-title {
                font-size: 1em;
            }

            #data-table-container,
            #user-input-container {
                padding: 8px !important;
                border-radius: 6px;
            }

            let userPoint = null;

            function updateCharts() {
                // Chart 1: XY scatter plot
                const svg1 = d3.select('#chart1 svg');
                svg1.selectAll('*').remove();

                // Filter out missing values
                const filtered = dataset.filter(d => d.LTS != null && d.Placement != null && d["Months played"] != null);

                // Scales
                const margin = { top: 20, right: 30, bottom: 40, left: 60 };
                const width = 800 - margin.left - margin.right;
                const height = 400 - margin.top - margin.bottom;

                const x = d3.scaleLinear()
                    .domain([d3.min(filtered, d => d.LTS), d3.max(filtered, d => d.LTS)])
                    .range([0, width]);

                const y = d3.scaleLinear()
                    .domain([d3.max(filtered, d => d.Placement), d3.min(filtered, d => d.Placement)]) // invert
                    .range([height, 0]);

                const monthsMin = d3.min(filtered, d => d["Months played"]);
                const monthsMax = d3.max(filtered, d => d["Months played"]);
                const color = d3.scaleLinear()
                    .domain([monthsMin, monthsMax])
                    .range(["red", "green"]);

                const g = svg1.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

                // Axes
                const axisBottom1 = g.append('g')
                    .attr('transform', `translate(0,${height})`)
                    .call(d3.axisBottom(x));
                const axisLeft1 = g.append('g')
                    .call(d3.axisLeft(y));
                axisBottom1.selectAll('path, line').attr('stroke', '#000');
                axisLeft1.selectAll('path, line').attr('stroke', '#000');
                axisBottom1.selectAll('text').attr('fill', '#000');
                axisLeft1.selectAll('text').attr('fill', '#000');

                // Axis labels
                svg1.append('text')
                    .attr('x', margin.left + width / 2)
                    .attr('y', height + margin.top + 35)
                    .attr('text-anchor', 'middle')
                    .text('LTS');
                svg1.append('text')
                    .attr('transform', `rotate(-90)`)
                    .attr('x', -margin.top - height / 2)
                    .attr('y', 15)
                    .attr('text-anchor', 'middle')
                    .text('Placement (lower is better)');

                // Points
                const points = g.selectAll('circle')
                    .data(filtered)
                    .enter()
                    .append('circle')
                    .attr('cx', d => x(d.LTS))
                    .attr('cy', d => y(d.Placement))
                    .attr('r', 6)
                    .attr('fill', d => color(d["Months played"]))
                    .attr('stroke', '#333')
                    .attr('opacity', 0.8);
                points.append('title')
                    .text(d => `${d.Name}\nLTS: ${d.LTS}\nPlacement: ${d.Placement}\nMonths played: ${d["Months played"]}`);

                // Color legend for Months played
                const legendWidth = 350, legendHeight = 24;
                const legendSvg = d3.select('#color-legend')
                    .html("")
                    .append('svg')
                    .attr('width', legendWidth)
                    .attr('height', 70);

                // Gradient
                const defs = legendSvg.append('defs');
                const linearGradient = defs.append('linearGradient')
                    .attr('id', 'legend-gradient');
                linearGradient.append('stop')
                    .attr('offset', '0%')
                    .attr('stop-color', 'red');
                linearGradient.append('stop')
                    .attr('offset', '100%')
                    .attr('stop-color', 'green');

                legendSvg.append('rect')
                    .attr('x', 0)
                    .attr('y', 18)
                    .attr('width', legendWidth)
                    .attr('height', legendHeight)
                    .style('fill', 'url(#legend-gradient)');

                // Legend labels
                legendSvg.append('text')
                    .attr('x', 0)
                    .attr('y', 15)
                    .attr('text-anchor', 'start')
                    .attr('font-size', '15px')
                    .text(`Months played: ${monthsMin}`);
                legendSvg.append('text')
                    .attr('x', legendWidth)
                    .attr('y', 15)
                    .attr('text-anchor', 'end')
                    .attr('font-size', '15px')

                    .attr('y', 65)
                    .attr('text-anchor', 'middle')
                    .attr('font-size', '16px')
                    .text('Red = new, Green = old');

                        .attr('d', d3.symbol().type(d3.symbolStar).size(300))

                axisBottom2.selectAll('text').attr('fill', '#000');
                axisLeft2.selectAll('text').attr('fill', '#000');

                // Render data table

                    const columns = ["Name", "Months played", "LTS", "Placement"];
                    // Sort by Placement ascending
                    const sorted = [...data].sort((a, b) => a["Placement"] - b["Placement"]);
                    let html = '<table style="width:100%; border-collapse:collapse; font-size:1em;">';
                    html += '<thead><tr>' + columns.map(col => `<th style="border-bottom:2px solid #23283a; padding:8px; text-align:left; color:#23283a; background:#f7c873;">${col}</th>`).join('') + '</tr></thead>';
                    html += '<tbody>' + sorted.map(row =>
                        '<tr>' + columns.map(col => `<td style="border-bottom:1px solid #eee; padding:8px; color:#23283a; background:#fff;">${row[col] !== null && row[col] !== undefined ? row[col] : ''}</td>`).join('') + '</tr>'
                    ).join('') + '</tbody>';
                    html += '</table>';
                    $("#data-table").html(html);
                }
                renderDataTable(dataset);

                // User input form
                const userFormHtml = `
                    <div id="user-input-container" style="background: #fffbe6; border-radius: 10px; padding: 18px 24px 10px 24px; margin-bottom: 32px; box-shadow: 0 1px 6px #0002;">
                        <h2 style="color: #b8860b; font-size: 1.1em; margin-bottom: 10px;">Compare Your Stats</h2>
                        <form id="user-data-form" style="display: flex; flex-wrap: wrap; gap: 18px; align-items: flex-end;">
                            <div>
                                <label for="user-name" style="color:#23283a;">Name</label><br>
                                <input id="user-name" type="text" style="padding:4px 8px; border-radius:4px; border:1px solid #bbb; width:120px;">
                            </div>
                            <div>
                                <label for="user-months" style="color:#23283a;">Months played</label><br>
                                <input id="user-months" type="number" min="0" style="padding:4px 8px; border-radius:4px; border:1px solid #bbb; width:80px;">
                            </div>
                            <div>
                                <label for="user-lts" style="color:#23283a;">LTS</label><br>
                                <input id="user-lts" type="number" min="0" style="padding:4px 8px; border-radius:4px; border:1px solid #bbb; width:100px;">
                            </div>
                            <div>
                                <label for="user-placement" style="color:#23283a;">Placement</label><br>
                                <input id="user-placement" type="number" min="0" style="padding:4px 8px; border-radius:4px; border:1px solid #bbb; width:80px;">
                            </div>
                            <div style="display:flex; align-items:center; gap:6px; margin-top:8px;">
                                <input id="user-save-checkbox" type="checkbox" checked style="accent-color:#f7c873; width:18px; height:18px;">
                                <label for="user-save-checkbox" style="color:#23283a; font-size:0.98em; cursor:pointer;">Allow my data to be saved</label>
                            </div>
                            <div>
                                <button type="submit" style="background:#f7c873; color:#23283a; border:none; border-radius:4px; padding:7px 18px; font-weight:bold; cursor:pointer;">Show on Charts</button>
                            </div>
                        </form>
                        <div id="user-input-message" style="color:#b8860b; margin-top:8px;"></div>
                    </div>
                `;
                $("#user-input-container").html(userFormHtml);

                // Handle user form
                $('#user-data-form').on('submit', function(e) {
                    e.preventDefault();
                    const name = $('#user-name').val();
                    const months = parseFloat($('#user-months').val());
                    const lts = parseFloat($('#user-lts').val());
                    const placement = parseFloat($('#user-placement').val());
                    const allowSave = $('#user-save-checkbox').is(':checked');
                    if (isNaN(months) || isNaN(lts) || isNaN(placement)) {
                        $('#user-input-message').text('Please enter valid numbers for all fields.');
                        return;
                    }
                    userPoint = { Name: name, "Months played": months, LTS: lts, Placement: placement };
                    $('#user-input-message').text('Your data is now shown on the charts!');
                    updateCharts();
                    // Save to server if allowed
                    if (allowSave) {
                        fetch('save_user_data.php', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(userPoint)
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (!data.success) {
                                $('#user-input-message').append(' (Could not save to server)');
                            }
                        })
                        .catch(() => {
                            $('#user-input-message').append(' (Could not save to server)');
                        });
                    }
                });

                // Player search form
                const playerSearchHtml = `
                    <div id="player-search-container" style="background: #e6f0ff; border-radius: 10px; padding: 14px 24px 10px 24px; margin-bottom: 24px; box-shadow: 0 1px 6px #0002;">
                        <form id="player-search-form" style="display: flex; gap: 12px; align-items: flex-end;">
                            <div>
                                <label for="player-search" style="color:#23283a;">Search player by name</label><br>
                                <input id="player-search" type="text" style="padding:4px 8px; border-radius:4px; border:1px solid #bbb; width:160px;" autocomplete="off">
                                <div id="player-suggestions" style="position:relative; z-index:10;"></div>
                            </div>
                            <div>
                                <button type="submit" style="background:#1e90ff; color:#fff; border:none; border-radius:4px; padding:7px 18px; font-weight:bold; cursor:pointer;">Highlight Player</button>
                            </div>
                        </form>
                        <div id="player-search-message" style="color:#1e90ff; margin-top:8px;"></div>
                    </div>
                `;
                $("#player-search-container").html(playerSearchHtml);

                // Handle player search form
                $('#player-search-form').on('submit', function(e) {
                    e.preventDefault();
                    const searchName = $('#player-search').val().trim().toLowerCase();
                    highlightedPlayer = null;
                    if (!searchName) {
                        $('#player-search-message').text('Please enter a player name.');
                        updateCharts();
                        return;
                    }
                    const found = dataset.find(d => d.Name && d.Name.toLowerCase() === searchName);
                    if (found) {
                        highlightedPlayer = found;
                        $('#player-search-message').text(`Player "${found.Name}" is highlighted on the charts.`);
                    } else {
                        $('#player-search-message').text('Player not found.');
                    }
                    updateCharts();
                });

                // Autosuggest for player search
                $('#player-search').on('input', function() {
                    const val = $(this).val().toLowerCase();
                    let suggestions = [];
                    if (val.length > 0) {
                        suggestions = dataset
                            .filter(d => d.Name && d.Name.toLowerCase().includes(val))
                            .map(d => d.Name)
                            .slice(0, 8);
                    }
                    const $suggestions = $('#player-suggestions');
                    if (suggestions.length > 0) {
                        $suggestions.html('<div style="position:absolute; background:#fff; border:1px solid #bbb; border-radius:4px; box-shadow:0 2px 8px #0002; width:160px;">' +
                            suggestions.map(name => `<div class="suggestion-item" style="padding:6px 10px; cursor:pointer; color:#23283a;">${name}</div>`).join('') + '</div>');
                        $('.suggestion-item').on('mousedown', function(e) {
                            e.preventDefault();
                            $('#player-search').val($(this).text());
                            $suggestions.empty();
                        });
                    } else {
                        $suggestions.empty();
                    }
                });
                // Hide suggestions on blur
                $('#player-search').on('blur', function() {
                    setTimeout(() => { $('#player-suggestions').empty(); }, 150);
                });
            }
            // Initial render
            updateCharts();
        });
    </script>
</head>
