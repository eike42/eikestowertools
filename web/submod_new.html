function roll(slots,locked, mod,banned)
{
	var quals=[];
	var types=[];

	create_pools(mod,locked,banned);

	for(var i=0;i<slots-locked.length;i++)
	{
		var r=Math.random();

		// select rarity
		if(r<=chance[5])
			quals[i] = 5;
		else if(r<=chance[4])
			quals[i] = 4;
		else if(r<=chance[3])
			quals[i] = 3;
		else if(r<=chance[2])
			quals[i] = 2;
		else if(r<=chance[1])
			quals[i] = 1;
		else
			quals[i] = 0;

		// no more item in this rarity class? move class up
		if(pools[quals[i]].length == 0)
			quals[i]++;
		if(pools[quals[i]].length == 0)
			quals[i]++;
		if(pools[quals[i]].length == 0)
			quals[i]++;
		if(pools[quals[i]].length == 0)
			quals[i]++;

		// select submodule
		var item = Math.floor(Math.random()*pools[quals[i]].length);
		types[i] = pools[quals[i]][item];

		// remove selected submodule from the pools
		for(var j=0;j<6;j++)
		{
			if(pools[j].indexOf(types[i]!=-1))
				pools[j].splice(pools[j].indexOf(types[i]),1);
		}
	}
	var res=[];
	for(var i=0;i<types.length;i++)
	{
		res.push({ "qual":quals[i], "type":types[i] });
	}

	return res;
}


function create_pools(mod,locked,banned)
{
	pools = [[],[],[],[],[],[]];

	// 0=common, 1=rare, 2=epic, 3=legendary, 4=mythic, 5=ancestral
	for(var sm=0;sm<submods[mod].length;sm++)
	{
		if(locked.indexOf(sm)!=-1) continue; // locked - don't use
		if(banned.indexOf(sm)!=-1) continue; // banned - don't use
	
		for(var s = 0;s<6;s++)
		{
			if(submods[mod][sm][s+1]!="n/a")
				pools[s].push(sm);
		}
	}
}

function fits(goal,roll)
{
	if(goal===undefined)
		return false;
	if(roll.type==goal.mod && roll.qual >= goal.qual)
		return true;
	else
		return false;
}


function hit(res,goals,strat,found)
{
	var hit = [];
	for(var i=0;i<res.length;i++)
	{
		if(fits(goals[0], res[i]))
		{
			goals.splice(0,1);
			hit.push(res[i].type);
		}
	
		if(strat>1 && (strat - found>1) && goals.length>1)
		if(fits(goals[1], res[i]))
		{
			goals.splice(1,1);
			hit.push(res[i].type);
		}
			
		if(strat>2 && (strat - found>2) && goals.length>2)
		if(fits(goals[2], res[i]))
		{
			goals.splice(2,1);
			hit.push(res[i].type);
		}
		
					
		if(strat>3 && (strat - found>3) && goals.length>3)
		if(fits(goals[3], res[i]))
		{
			goals.splice(3,1);
			hit.push(res[i].type);
		}
	
	}

	return hit;
}

function calc()
{
	var html="";

	var mod = parseInt($('#mod').val());
	var quality = parseInt($('#quality').val());
	var slots = parseInt($('#slots').val());
	var bans = parseInt($('#bans').val());
	var strat =parseInt($('#strat').val());
	var shards =parseInt($('#shards').val());
	var sims =parseInt($('#sims').val());
	
	var resultfound=[[],[],[],[],[],[],[],[]];
	var resultcosts=[];
	
	
	
	
	for(var sim = 0;sim<sims;sim++) 
	{
		var start = window.performance.now();
		var goals = [];
		var banned = [];
		
		var locked = [];
		
		for(var i=0;i<slots;i++)
		{
			var g = parseInt($("input[name=slot"+i+"]:checked").val());
			var t = parseInt($("#slotmod"+i).val());
			if(g>0)
				goals.push({"mod":t,"qual":g });
			if(g==-1)
				locked.push(t);
		}
		
		for(var i=0;i<bans;i++)
		{
			var t = parseInt($("#banmod"+i).val());
			banned.push(t);
		}

		// run simulations
		var cost = 0;
		var round = 0;
		var found = 0;

		//console.log(`You have ${bans} banned out of ${numsubmodules} possible submodules`);
		
		//create_pools();
		
		while(goals.length>0)
		{
			var res = roll(slots,locked, mod, banned);
			cost += locks[locked.length];
			round++;
		
			var hits = hit(res,goals,strat,found);
			
			if(hits.length>0)
			{
				resultfound[found].push(cost);
				if(hits.length>1) resultfound[found+1].push(cost);
				if(hits.length>2) resultfound[found+2].push(cost);
				if(hits.length>3) resultfound[found+3].push(cost);
				if(hits.length>4) resultfound[found+4].push(cost);

				locked.push(hits[0]);
				if(hits.length>1) locked.push(hits[1]);
				if(hits.length>2) locked.push(hits[2]);
				if(hits.length>3) locked.push(hits[3]);
				if(hits.length>4) locked.push(hits[4]);
			
				
				found+=hits.length;
				// console.log("found #"+locked);
				// html+=`Found ${locked} after ${cost} shards.`;
			}
			//if(round%10==0) $('#round').text(round);
			if(round>1000000) break;
		}
		
		resultcosts.push(cost);
		
		if(sim==1)
		{
			var ms = window.performance.now() - start;
			if(ms*sims>10000)
				if(!confirm("The simulation will run about "+(ms*sims/1000).toFixed(1)+" seconds. Do you want to continue?"))
				{
					break;
				}
		}
	}
	
	//console.log(resultcosts,resultfound);
		
	
	
	// avg
	for(var i = 0;i<found;i++)
	{
		r=findMinMaxAvg(resultfound[i] ,shards);
		
		html += "Found stat "+(i+1)+" after an average of "+r[2].toLocaleString()+" shards, min="+r[0].toLocaleString()+", max="+r[1].toLocaleString()+". Successrate with your shards: "+(r[3]*100).toFixed(1)+"%.<br />";
	
	
	}
	
	
	
	

	$('#textresult').html(html);
	
}

function findMinMaxAvg(arr, lim){
  var min = arr[0]; // min
  var max = arr[0]; // max
  var sum = arr[0]; // sum
  var underlim = arr[0] <= lim ? 1 : 0;

  for(var i = 1; i < arr.length; i++){
    if (arr[i] < min) {
      min = arr[i];
    }
    if (arr[i] > max) {
      max = arr[i];
    }
    sum = sum + arr[i];
	if(arr[i] <= lim) underlim++;
  }
  return [min, max, sum / arr.length, underlim / arr.length]
}

function update()
{
	var slots = $('#slots').val();
	if(slots>8) slots=8;
	$('#slots').val(slots);

	var quality = parseInt($('#quality').val());

	var html=""; 
	for(var i=0;i<slots;i++)
	{
		html+="<input type=radio name=slot"+i+" value=-1> locked</input> ";
		html+="<input type=radio name=slot"+i+" value=2> epic</input> ";
		if(quality>2)
			html+="<input type=radio name=slot"+i+" value=3> legendary</input> ";
		if(quality>3)
		html+="<input type=radio name=slot"+i+" value=4> mythic</input> ";
		if(quality>4)
		html+="<input type=radio name=slot"+i+" value=5> ancestral</input> ";
		html+=getSelect('slotmod'+i);
		html+="<input type=radio name=slot"+i+" value=0 checked> don't care</input> ";
		html+="<br/>";
	}
	$('#goal').html(html);
	UpdateSlotVisiblity();
	$('input[type=radio]').click(UpdateSlotVisiblity);
}

function UpdateSlotVisiblity()
{
	var slots=$('#slots').val();
	for(var i=0;i<slots;i++)
	{
		var g = $("input[name=slot"+i+"]:checked").val();
		if(g==0)
			$('#slotmod'+i).hide();
		else
			$('#slotmod'+i).show();
	}
}

function getSelect(id)
{
	var mod = $('#mod').val();
	var html="<select id="+id+">";
	for(var i=0;i<submods[mod].length;i++)
	{
		html+="<option value='"+i+"'>"+getDesc(submods[mod][i])+"</option> ";
	}
	html+="</select>";
	return html;
}

function updatebans()
{
	var bans=$('#bans').val();
	var html="";
	for(var i=0;i<bans;i++)
	{
		html+=getSelect('banmod'+i)+'</br>';
	}
	$('#selectbans').html(html);

}

function getDesc(sub)
{
	var ret = sub[0];
	var rar = "";
	if(sub[1]=="n/a") rar="(no common)";
	if(sub[2]=="n/a") rar="(no rare)";
	if(sub[3]=="n/a") rar="(no epic)";
	if(sub[4]=="n/a") rar="(no legendary)";
	return ret+" "+rar;
}
