	function calc_perks_per_wave(spb,req)
	{
		var ret = [ [0],[0],[0],[0] ];
		var pwrfac = 0.2 * (1 + spb * 0.01);
	
		for(var i=1;i<100;i++)
		{
			var next = i < 21 ? 200 :
				i < 31 ? 250 :
				i < 41 ? 300 : 350;
		
			ret[0][i] = ret[0][i - 1] + Math.floor((next - req));
			ret[1][i] = ret[1][i - 1] + Math.floor((next - req) * (1 - pwrfac));
			ret[2][i] = ret[2][i - 1] + Math.floor((next - req) * (1 - pwrfac - pwrfac));
			ret[3][i] = ret[3][i - 1] + Math.floor((next - req) * (1 - pwrfac - pwrfac - pwrfac));
		}
		return ret;
	}
	
	function draw_perk(bag, c)
	{
		var list = bag.filter(item => item.rarity == c && item.type != 0);
		if(list.length==0)
		{
			return null; // change this later
		}
	
		var r = Math.floor(Math.random() * list.length);
		return list[r];
	}
		
	
	function draw_perks(pcc,bag)
	{
		var ret = [];
		for(var i=0;i<pcc;i++)
		{
			var r = Math.random(); // 65/20/15
			if(r < 0.65) c = 0
			else if (r < 0.85) c = 1;
			else c = 2;
		
			var choice = draw_perk(bag,c);
			ret.push(choice);
		}
	}
